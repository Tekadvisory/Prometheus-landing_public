
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prometheus Advisory | Strategic Autonomy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Castoro', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Castoro:ital@0;1&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=JetBrains+Mono:wght@400;700;800;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --obsidian: #030406;
            --glass-bg: rgba(15, 18, 25, 0.7);
            --border-white: rgba(255, 255, 255, 0.12);
        }
        body {
            font-family: 'Castoro', serif;
            background-color: var(--obsidian);
            color: #f1f5f9;
            letter-spacing: -0.011em;
            line-height: 1.7;
            overflow-x: hidden;
        }
        
        .bg-grid-tactical {
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(212, 175, 55, 0.08) 1px, transparent 0);
            background-size: 64px 64px;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border-white);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .ambient-glow {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -1;
            background: 
                radial-gradient(circle at 90% 10%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 10% 90%, rgba(59, 130, 246, 0.04) 0%, transparent 50%);
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        h1, h2, h3 {
            text-wrap: balance;
            color: #ffffff;
        }

        ::selection {
            background: var(--gold);
            color: #000;
        }

        @keyframes scan-line {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.3; }
            100% { transform: translateY(200%); opacity: 0; }
        }

        .animate-scan {
            position: relative;
            overflow: hidden;
        }
        .animate-scan::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to bottom, transparent, var(--gold), transparent);
            opacity: 0;
            pointer-events: none;
        }
        .animate-scan:hover::after {
            animation: scan-line 2s linear infinite;
        }

        @keyframes aura-pulse {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.2); }
            70% { box-shadow: 0 0 0 20px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }

        .animate-aura:hover {
            animation: aura-pulse 2s infinite;
        }

        @keyframes subtle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-subtle-bounce {
            animation: subtle-bounce 1s ease-in-out infinite;
        }

        @keyframes image-breath {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        .animate-breath {
            animation: image-breath 15s ease-in-out infinite;
        }

        @keyframes scan-shimmer {
            0% { transform: translateX(-200%); }
            100% { transform: translateX(200%); }
        }

        .tactical-mask {
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        .img-tactical-gold {
            filter: sepia(0.6) brightness(0.7) contrast(1.1) hue-rotate(-10deg);
            transition: filter 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .group:hover .img-tactical-gold {
            filter: sepia(0) brightness(1) contrast(1) hue-rotate(0deg);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-grid-tactical">
    <div class="noise-overlay"></div>
    <div class="ambient-glow"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
